name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test dependencies
        run: pip install -e .[geo] pytest
      # The sample model is a release asset, not in git — data-dependent
      # tests skip automatically; this still exercises imports, parser
      # primitives, and all data-independent tests.
      - name: Run test suite
        run: pytest tests/ -q
